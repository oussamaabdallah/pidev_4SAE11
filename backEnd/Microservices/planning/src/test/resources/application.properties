# Test configuration for planning microservice
welcome.message=Welcome to Planning API
task.service.url=http://localhost:8091
# Disable Spring Cloud Config for unit/slice tests
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
# In-memory DB for full context tests (e.g. PlanningApplicationTests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
