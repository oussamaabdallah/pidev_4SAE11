spring.application.name=Project
server.port=8084

# Feign circuit breaker (enables fallback when Portfolio is unavailable)
spring.cloud.openfeign.circuitbreaker.enabled=true

welcome.message=Welcome to Project microservice (local config)

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka/
eureka.instance.prefer-ip-address=true



# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/projectdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Config Server client
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

# Actuator refresh endpoint exposure
management.endpoints.web.exposure.include=refresh
