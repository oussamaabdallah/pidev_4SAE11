spring.application.name=planning
server.port=8081

welcome.message=Welcome to planning microservice (from Config Server)

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

# MySQL Database (requires MySQL running on localhost:3306)
spring.datasource.url=jdbc:mysql://localhost:3306/planningdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=15000&socketTimeout=15000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI (exclude Data REST/HATEOAS configs incompatible with Spring Boot 4)
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator refresh endpoint exposure
management.endpoints.web.exposure.include=refresh

# Inter-service URLs (for Feign)
project.service.url=http://localhost:8084

# Google Calendar – use GOOGLE_APPLICATION_CREDENTIALS or credentials-path (never commit the JSON).
# See backEnd/Microservices/planning/CALENDAR_SETUP.md. When disabled, events come from DB.
google.calendar.enabled=false
google.calendar.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}
google.calendar.default-calendar-id=primary

# GitHub API – token from GITHUB_TOKEN env, github.token, or github.token-file (never commit tokens)
github.enabled=true
github.token=${GITHUB_TOKEN:}
github.token-file=${GITHUB_TOKEN_FILE:../../../githubToken.txt}