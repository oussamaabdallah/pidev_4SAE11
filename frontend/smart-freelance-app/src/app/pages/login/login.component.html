<div class="auth-page">
  <a routerLink="/" class="back-link">← Back to Home</a>

  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back!</h1>
      <p class="subtitle">Sign in to your Freelancia account</p>
    </div>

    @if (errorMessage) {
      <div class="error-banner" role="alert">
        <span class="error-title">Login failed</span>
        <span class="error-text">{{ errorMessage }}</span>
        <span class="error-retry">You can try again below.</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
          [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          aria-describedby="email-error"
          [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        @if (getEmailError(); as msg) {
          <span id="email-error" class="field-error">{{ msg }}</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [attr.aria-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          aria-describedby="password-error"
          [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        @if (getPasswordError(); as msg) {
          <span id="password-error" class="field-error">{{ msg }}</span>
        }
        <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <div class="field checkbox-field">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="staySignedIn" />
          <span>Stay signed in</span>
        </label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="switch-link">
      Don't have an account? <a routerLink="/signup">Sign up</a>
    </p>
  </div>
</div>
