<div class="dashboard-home">

  @if (isFetching()) {
    <!-- ── Initial fetch skeleton ────────────────────────────── -->
    <div class="feed-skeleton" aria-label="Loading projects" role="status">
      @for (i of [1,2,3]; track i) {
        <div class="skeleton-card">
          <div class="sk-header">
            <div class="sk-avatar"></div>
            <div class="sk-lines">
              <div class="sk-line sk-line--md"></div>
              <div class="sk-line sk-line--sm"></div>
            </div>
          </div>
          <div class="sk-line sk-line--title"></div>
          <div class="sk-line"></div>
          <div class="sk-line sk-line--md"></div>
          <div class="sk-line sk-line--sm"></div>
          <div class="sk-pills">
            <div class="sk-pill"></div>
            <div class="sk-pill"></div>
            <div class="sk-pill"></div>
          </div>
        </div>
      }
    </div>
  } @else {
    <!-- ── Live project feed ──────────────────────────────────── -->
    <app-projects-feed
      [projects]="displayedProjects()"
      [hasMore]="hasMore()"
      [isLoading]="isLoading()"
      [pageSize]="pageSize"
      (loadMore)="loadMoreProjects()" />
  }

</div>


<section *ngIf="userRole === 'FREELANCER'" class="recommendations">

  <h2>🔥 Recommended For You</h2>

  <div *ngIf="isLoadingRecommendations">
    Loading recommendations...
  </div>

  <div *ngIf="!isLoadingRecommendations && recommendedProjects.length === 0">
    No recommendations available.
  </div>

  <div class="recommended-card"
       *ngFor="let project of recommendedProjects">

    <h3>{{ project.title }}</h3>

    <p>{{ project.description }}</p>

    <p>
      <strong>Skills:</strong>
      {{ project.skillsRequiered }}
    </p>

    <a [routerLink]="['/dashboard/browse-jobs/', project.id, 'show']">
      View Project
    </a>
  </div>

</section>
